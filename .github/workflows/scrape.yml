name: Scrape NYPD CompStat

on:
  # NYPD publishes weekly CompStat data Monday–Tuesday after the reporting week ends Sunday.
  # Run multiple times to catch it as early as possible:
  #   Monday 6 PM ET (22:00 UTC) — catches early publications
  #   Tuesday 8 AM ET (12:00 UTC) — morning check
  #   Tuesday 6 PM ET (22:00 UTC) — afternoon check
  schedule:
    - cron: '0 22 * * 1'
    - cron: '0 12 * * 2'
    - cron: '0 22 * * 2'
  
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas requests openpyxl

      - name: Run scraper
        run: python scraper.py --boroughs --housing --format both --output ./data

      - name: Validate output
        run: python validate.py --file ./data/latest_compstat.json

      - name: Commit and push results
        run: |
          git config user.name "CompStat Bot"
          git config user.email "compstat-bot@users.noreply.github.com"
          git add data/
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            WEEK=$(python -c "import json; d=json.load(open('data/latest_compstat.json')); print(d.get('citywide',{}).get('report_period',{}).get('week_end','unknown'))")
            git commit -m "Update CompStat data: week ending ${WEEK}"
            git push
          fi
